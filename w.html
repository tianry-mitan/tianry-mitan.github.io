<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tianry · 文章</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0c;
    --surface:#111114;
    --surface2:#1a1a1e;
    --border:rgba(255,255,255,0.06);
    --accent:#ff6900;
    --accent-dim:rgba(255,105,0,0.12);
    --text-1:rgba(255,255,255,0.93);
    --text-2:rgba(255,255,255,0.55);
    --text-3:rgba(255,255,255,0.28);
    --green:#07c160;
    --blue:#2f80ed;
  }
  html{scroll-behavior:smooth}
  body{
    background-color:var(--bg);
    color:var(--text-1);
    font-family:'Noto Sans SC','Space Grotesk',system-ui,sans-serif;
    line-height:1.6;
    min-height:100vh;
    padding:40px 24px;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 30%,rgba(255,105,0,0.04) 0%,transparent 60%),
               radial-gradient(ellipse at 30% 70%,rgba(47,128,237,0.03) 0%,transparent 50%);
  }
  body::after{
    content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:0.4;
  }
  .container{
    position:relative;z-index:1;
    max-width:540px;margin:0 auto;
  }

  /* 顶栏 */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:32px;
    animation:fadeUp 0.5s ease forwards;opacity:0;
  }
  .topbar-left{display:flex;align-items:center;gap:10px}
  .topbar-back{
    width:36px;height:36px;border-radius:10px;
    background:var(--surface);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    text-decoration:none;font-size:16px;color:var(--text-2);
    transition:all 0.2s ease;
  }
  .topbar-back:hover{border-color:rgba(255,255,255,0.15);color:var(--text-1)}
  .topbar-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:20px;font-weight:700;color:var(--text-1);
    letter-spacing:-0.3px;
  }
  .topbar-count{
    font-size:11px;font-weight:600;color:var(--text-3);
    padding:4px 12px;border-radius:100px;
    background:var(--surface);border:1px solid var(--border);
    font-family:'Space Grotesk',monospace;
  }

  /* 标签筛选 */
  .tags{
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;
    animation:fadeUp 0.5s ease 0.08s forwards;opacity:0;
  }
  .tag{
    font-size:12px;font-weight:500;padding:5px 14px;
    border-radius:100px;cursor:pointer;
    border:1px solid var(--border);background:transparent;
    color:var(--text-3);
    transition:all 0.25s ease;
  }
  .tag:hover{border-color:rgba(255,255,255,0.2);color:var(--text-2)}
  .tag-active{
    background:var(--accent-dim);border-color:rgba(255,105,0,0.3);
    color:var(--accent);
  }

  /* 文章列表 */
  .list{display:flex;flex-direction:column;gap:10px}
  .article{
    display:flex;align-items:center;gap:16px;
    padding:18px 20px;border-radius:16px;
    background:var(--surface);border:1px solid var(--border);
    text-decoration:none;
    transition:all 0.3s cubic-bezier(0,0,0.2,1);
    cursor:pointer;
  }
  .article:hover{
    border-color:rgba(255,105,0,0.2);
    transform:translateY(-2px);
    box-shadow:0 12px 40px rgba(0,0,0,0.3);
  }
  .article-dot{
    width:8px;height:8px;border-radius:4px;flex-shrink:0;
  }
  .article-body{flex:1;min-width:0}
  .article-title{
    font-size:15px;font-weight:600;color:var(--text-1);
    margin-bottom:4px;letter-spacing:-0.2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .article-meta{
    display:flex;align-items:center;gap:8px;
    font-size:11px;color:var(--text-3);
  }
  .article-tag{
    font-size:9px;font-weight:600;padding:2px 8px;
    border-radius:100px;letter-spacing:0.3px;
  }
  .article-arrow{
    color:var(--text-3);font-size:14px;flex-shrink:0;
    transition:transform 0.25s ease,color 0.25s ease;
  }
  .article:hover .article-arrow{
    transform:translateX(3px);color:var(--accent);
  }

  /* 空状态 */
  .empty{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;
    padding:60px 24px;
    animation:fadeUp 0.6s ease 0.15s forwards;opacity:0;
  }
  .empty-icon{
    width:80px;height:80px;border-radius:20px;
    background:var(--surface);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;margin-bottom:20px;
  }
  .empty-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;font-weight:600;color:var(--text-1);
    margin-bottom:8px;
  }
  .empty-desc{
    font-size:13px;color:var(--text-3);text-align:center;
    max-width:280px;line-height:1.7;
  }
  .empty-line{
    width:40px;height:1px;background:var(--border);
    margin:20px 0;
  }
  .empty-hint{
    font-size:11px;color:var(--text-3);
    font-family:'Space Grotesk',monospace;
    letter-spacing:0.3px;
  }

  /* 底部 */
  .footer{
    margin-top:40px;display:flex;align-items:center;justify-content:space-between;
  }
  .footer-left{font-size:10px;color:var(--text-3)}
  .footer-right{font-family:'Space Grotesk',monospace;font-size:10px;color:var(--text-3);letter-spacing:0.5px}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>

<div class="container">

  <!-- 顶栏 -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="index.html">‹</a>
      <span class="topbar-title">文章</span>
    </div>
    <span class="topbar-count">0 篇</span>
  </div>

  <!-- 标签筛选 -->
  <div class="tags">
    <span class="tag tag-active">全部</span>
    <span class="tag">Vela 开发</span>
    <span class="tag">UI 设计</span>
    <span class="tag">教程</span>
  </div>

  <!--
    文章列表

    当前为空，以后加文章就在这写 <a class="article"> 块。
    复制下面的模板，改掉内容即可。

    模板：
    <a class="article" href="文章链接">
      <div class="article-dot" style="background:颜色值"></div>
      <div class="article-body">
        <div class="article-title">标题</div>
        <div class="article-meta">
          <span class="article-tag" style="color:颜色;background:背景色">分类</span>
          <span>2026.07.12</span>
          <span>阅读 5 分钟</span>
        </div>
      </div>
      <span class="article-arrow">→</span>
    </a>
  -->

  <!-- 空状态 -->
  <div class="empty">
    <div class="empty-icon">📄</div>
    <div class="empty-title">暂无文章</div>
    <div class="empty-desc">还没有发布任何文章，这里将在未来承载开发笔记与设计思考。</div>
    <div class="empty-line"></div>
    <div class="empty-hint">COMING SOON</div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <span class="footer-left">© 2026 tianry</span>
    <span class="footer-right">Wiryre v2R</span>
  </div>

</div>

</body>
</html>
