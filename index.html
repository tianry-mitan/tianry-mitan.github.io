<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tianry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0c;
    --surface:#111114;
    --surface2:#1a1a1e;
    --border:rgba(255,255,255,0.06);
    --accent:#ff6900;
    --accent-dim:rgba(255,105,0,0.12);
    --text-1:rgba(255,255,255,0.93);
    --text-2:rgba(255,255,255,0.55);
    --text-3:rgba(255,255,255,0.28);
    --green:#07c160;
    --blue:#2f80ed;
  }
  html{scroll-behavior:smooth}
  body{
    background-color:var(--bg);
    color:var(--text-1);
    font-family:'Noto Sans SC','Space Grotesk',system-ui,sans-serif;
    line-height:1.6;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 30%,rgba(255,105,0,0.04) 0%,transparent 60%),
               radial-gradient(ellipse at 30% 70%,rgba(47,128,237,0.03) 0%,transparent 50%);
  }
  body::after{
    content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:0.4;
  }
  .card{
    position:relative;z-index:1;
    width:100%;max-width:420px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:40px 36px;
    animation:fadeUp 0.6s ease forwards;
  }
  .avatar{
    width:72px;height:72px;border-radius:20px;
    background:linear-gradient(135deg,var(--accent),#d55b00);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:20px;
  }
  .avatar-t{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:700;color:#fff;letter-spacing:-1px;
  }
  .name{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:700;color:var(--text-1);
    letter-spacing:-0.5px;margin-bottom:4px;
  }
  .sub{
    font-size:12px;font-weight:500;color:var(--accent);
    letter-spacing:0.5px;margin-bottom:16px;
  }
  .bio{
    font-size:14px;color:var(--text-2);line-height:1.8;
    margin-bottom:24px;
  }
  .divider{
    width:100%;height:1px;
    background:var(--border);margin:24px 0;
  }
  .links{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .link{
    display:flex;align-items:center;gap:14px;
    padding:14px 18px;border-radius:16px;
    background:var(--surface2);border:1px solid var(--border);
    text-decoration:none;
    transition:all 0.3s cubic-bezier(0,0,0.2,1);
  }
  .link:hover{
    border-color:rgba(255,105,0,0.2);
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
  }
  .link-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
  }
  .link-info{flex:1}
  .link-name{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:1px}
  .link-url{font-size:10px;color:var(--text-3);font-family:'Space Grotesk',monospace;letter-spacing:0.3px}
  .link-arrow{color:var(--text-3);font-size:14px;transition:transform 0.25s ease}
  .link:hover .link-arrow{transform:translateX(3px);color:var(--accent)}
  .announce-header{
    display:flex;align-items:center;margin-bottom:12px;
  }
  .announce-title{
    font-size:11px;font-weight:600;color:var(--text-3);
    letter-spacing:1px;text-transform:uppercase;
  }
  .announce-box{
    background:var(--surface2);border:1px solid var(--border);
    border-radius:14px;padding:16px 20px;
  }
  .announce-text{
    font-size:13px;color:var(--text-2);line-height:1.8;
    white-space:pre-wrap;
  }
  .footer{
    margin-top:24px;display:flex;align-items:center;justify-content:space-between;
    width:100%;
  }
  .footer-left{font-size:10px;color:var(--text-3)}
  .footer-right{font-family:'Space Grotesk',monospace;font-size:10px;color:var(--text-3);letter-spacing:0.5px}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }
  @media(max-width:480px){
    .card{padding:32px 24px;border-radius:20px}
    .name{font-size:24px}
  }
</style>
</head>
<body>

<div class="card">

  <!-- 头像 & 信息 -->
  <div class="avatar"><span class="avatar-t">ty</span></div>
  <div class="name">tianry</div>
  <div class="sub">可穿戴设备 · UI 设计 · Vela 开发</div>
  <div class="bio">
    专注小米手表 Vela 快应用开发，以 HyperOS 设计标准为基线，在 466×466 的圆形画布上构建轻量、直觉、节能的数字体验。
  </div>

  <!-- 链接 -->
  <div class="links">
    <a class="link" href="https://www.bandbbs.cn/members/3780593/" target="_blank">
      <div class="link-icon" style="background:rgba(255,105,0,0.12);color:var(--accent)">◆</div>
      <div class="link-info">
        <div class="link-name">米坛社区</div>
        <div class="link-url">bandbbs.cn/members/3780593</div>
      </div>
      <span class="link-arrow">→</span>
    </a>
    <a class="link" href="https://www.douyin.com/user/self?from_tab_name=main&showTab=like" target="_blank">
      <div class="link-icon" style="background:rgba(47,128,237,0.12);color:var(--blue)">♪</div>
      <div class="link-info">
        <div class="link-name">抖音</div>
        <div class="link-url">douyin.com</div>
      </div>
      <span class="link-arrow">→</span>
    </a>
  </div>
 <a href="tianry-mitan.github.io/w.html">我的一些东西</a>

  <div class="divider"></div>

  <!--
    公告 — 直接改下面 announce-text 里的文字就行
  -->
  <div class="announce-header">
    <span class="announce-title">公告</span>
  </div>
  <div class="announce-box">
    <div class="announce-text">欢迎来到我的主页。近期四款 Vela 快应用已上线米坛社区，欢迎体验。</div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <span class="footer-left">© 2026 tianry</span>
    <span class="footer-right">Wiryre v2R</span>
  </div>

</div>

</body>
</html>
